{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rentease.fullname" . }}-qdrant
  labels:
    {{- include "rentease.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rentease.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "rentease.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.qdrant.containerPort }}
          {{- if .Values.qdrant.storage.enabled }}
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          {{- end }}
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
      {{- if .Values.qdrant.storage.enabled }}
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: {{ include "rentease.fullname" . }}-qdrant
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rentease.fullname" . }}-qdrant
  labels:
    {{- include "rentease.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.qdrant.type }}
  selector:
    {{- include "rentease.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  ports:
    - port: {{ .Values.service.qdrant.port }}
      targetPort: {{ .Values.qdrant.containerPort }}
      protocol: TCP
      name: qdrant
{{- if .Values.qdrant.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rentease.fullname" . }}-qdrant
  labels:
    {{- include "rentease.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.qdrant.storage.size }}
{{- end }}
{{- end }}

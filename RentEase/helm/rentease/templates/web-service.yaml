apiVersion: v1
kind: Service
metadata:
  name: {{ include "rentease.fullname" . }}-web
  labels:
    {{- include "rentease.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  selector:
    {{- include "rentease.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: {{ .Values.web.containerPort }}
      protocol: TCP
      name: http

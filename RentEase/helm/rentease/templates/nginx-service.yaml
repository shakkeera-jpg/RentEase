apiVersion: v1
kind: Service
metadata:
  name: {{ include "rentease.fullname" . }}-nginx
  labels:
    {{- include "rentease.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.nginx.type }}
  selector:
    {{- include "rentease.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
  ports:
    - port: {{ .Values.service.nginx.port }}
      targetPort: {{ .Values.nginx.containerPort }}
      protocol: TCP
      name: http

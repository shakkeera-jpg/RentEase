services:

  
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5433:5432"
  
  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000 
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: "True"
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      AI_SERVICE_TIMEOUT_SECONDS: "30"
      AWS_REGION: ${AWS_REGION:-}
      NOTIFICATION_QUEUE_URL: ${NOTIFICATION_QUEUE_URL:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_FILE_OVERWRITE: ${AWS_S3_FILE_OVERWRITE:-False}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}
    depends_on:
      - db
      - redis

  
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

 
  celery:
    build: .
    container_name: celery_worker
    command: celery -A RentEase worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: "True"
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      AI_SERVICE_TIMEOUT_SECONDS: "30"
      AWS_REGION: ${AWS_REGION:-}
      NOTIFICATION_QUEUE_URL: ${NOTIFICATION_QUEUE_URL:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_FILE_OVERWRITE: ${AWS_S3_FILE_OVERWRITE:-False}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}

  
  
  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A RentEase beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: "True"
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      AI_SERVICE_TIMEOUT_SECONDS: "30"
      AWS_REGION: ${AWS_REGION:-}
      NOTIFICATION_QUEUE_URL: ${NOTIFICATION_QUEUE_URL:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_FILE_OVERWRITE: ${AWS_S3_FILE_OVERWRITE:-False}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}

  ai_service:
    build: ../ai-service
    container_name: ai_service
    ports:
      - "8001:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /cache/huggingface
    volumes:
      - hf_cache:/cache/huggingface

 
  nginx:
    image: nginx:latest
    container_name: api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - ai_service

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"    

volumes:
  postgres_data:
  hf_cache:
